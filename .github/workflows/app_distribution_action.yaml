name: Build & Distribute via Fastlane

on:
  pull_request:
    branches:
      - release
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v4

      - name: 📌 Get Flutter Version
        id: flutter_version
        run: |
          echo "version=$(grep 'flutter:' pubspec.lock | awk '{print $2}' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: 📦 Install Ruby, Bundler & Fastlane (user install)
        run: |
          sudo apt-get update
          sudo apt-get install ruby-full -y
          gem install --user-install bundler fastlane
          echo 'export PATH="$HOME/.gem/ruby/$(ruby -e "print RUBY_VERSION")/bin:$PATH"' >> $GITHUB_ENV

      - name: 🚀 Run Fastlane Firebase Distribution
        run: |
          export PATH="$HOME/.gem/ruby/$(ruby -e 'print RUBY_VERSION')/bin:$PATH"
          cd android
          bundle exec fastlane firebase_distribution
        env:
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}