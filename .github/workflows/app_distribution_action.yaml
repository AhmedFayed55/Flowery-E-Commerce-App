name: Build & Distribute via Fastlane

on:
  pull_request:
    branches:
      - release
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v4

      - name: 📌 Get Flutter Version
        id: flutter_version
        run: |
          echo "version=$(grep 'flutter:' pubspec.lock | awk '{print $2}' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: 📦 Install Ruby, Bundler & Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full build-essential
          gem install --user-install bundler
        shell: bash

      - name: 🚀 Setup Gems, Flutter & Run Fastlane
        run: |
         
          export PATH="$HOME/.gem/ruby/3.2.0/bin:$PATH"

         
          cd android

         
          bundle install --jobs=4 --retry=3

          
          bundle exec fastlane firebase_distribution
        shell: bash
        env:
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}
