name: Build & Distribute via Fastlane

on:
  pull_request:
    branches:
      - release
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Checkout Repository
        uses: actions/checkout@v4

      - name: 📌 Get Flutter Version
        id: flutter_version
        run: |
          echo "version=$(grep 'flutter:' pubspec.lock | awk '{print $2}' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: 🔧 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter_version.outputs.version }}

      - name: 📦 Install Ruby
        run: sudo apt-get update && sudo apt-get install -y ruby-full build-essential

      - name: 📦 Install Bundler in User Space
        run: gem install --user-install bundler

      - name: 🔧 Install Project Gems
        run: |
          export PATH="$HOME/.gem/ruby/3.2.0/bin:$PATH"
          cd android
          bundle install --jobs=4 --retry=3

      - name: 🧹 Flutter Clean & Pub Get
        run: |
          flutter clean
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🚀 Run Fastlane Firebase Distribution
        run: |
          export PATH="$HOME/.gem/ruby/3.2.0/bin:$PATH"
          cd android
          bundle exec fastlane firebase_distribution
        env:
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}